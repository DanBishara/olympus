CONFIG_I2C=y
CONFIG_SENSOR=y

CONFIG_LSM6DSO=y
CONFIG_LSM6DSO_TRIGGER_GLOBAL_THREAD=y

# the MAX30101 can be configured on init using various configs, and not through the device tree
CONFIG_MAX30101=y
# There is a whole lot of configuration options for the MAX30101, but for now we'll just set it up in heart rate mode with a medium LED power level. 
# See the driver documentation for more details on the various options.
# TODO: we may want to expose some of these options through the device tree or Kconfig in the future, but for now we'll just hardcode them in the driver.
CONFIG_MAX30101_HEART_RATE_MODE=n
CONFIG_MAX30101_SPO2_MODE=n
CONFIG_MAX30101_MULTI_LED_MODE=y
# With out current PA led current is 6.2mA, less than the max of 8mA, but we may want to increase this in the future if we find that the signal is too weak.
CONFIG_MAX30101_LED1_PA=0x24
CONFIG_MAX30101_LED2_PA=0x24
CONFIG_MAX30101_LED3_PA=0x7F
# 0=off, 1=red, 2=IR, 3=green
# need to have lower numbered slot enabled before higher
CONFIG_MAX30101_SLOT1=3
CONFIG_MAX30101_SLOT2=2
CONFIG_MAX30101_SLOT3=0
CONFIG_MAX30101_SLOT4=0
CONFIG_MAX30101_FIFO_A_FULL=15
# 100 samples per second
CONFIG_MAX30101_SR=2 
#average 4 samples
CONFIG_MAX30101_SMP_AVE=0

# Seems resolution is set by LED_PW, default is 18 bits. The driver currently doesn't support changing this, but if we wanted to we could add support for it and then set it here.
# With ADC_RGE set to 0x2, 1 LSB for 18 bits is 31.25 pA, which gives us a max current of about 8 mA
# 0=2048, 1=4096, 2=8192, 3=16384
# above is full scale range 
CONFIG_MAX30101_ADC_RGE=1

# CONFIG_NPM1300_CHARGER=n #depends on having dt setup with charger