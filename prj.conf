
CONFIG_SHELL=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=y
# 0 = OFF, 1 = ERROR, 2 = WARNING, 3 = INFO, 4 = DEBUG
CONFIG_LOG_DEFAULT_LEVEL=3 
CONFIG_LOG_MODE_DEFERRED=y

#not sure if this does anything but will set to n just in case
CONFIG_FPROTECT=n

CONFIG_GPIO=y

CONFIG_STATIC_INIT_GNU=y

CONFIG_I2C=y

CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_LED=y

# Stops from printing *** Booting nRF Connect SDK v3.1.1-e2a97fe2578a ***
CONFIG_NCS_BOOT_BANNER=y
CONFIG_BOOT_BANNER=y

# Redirect standard Printk/Printf
CONFIG_PRINTK=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Essential SEGGER RTT Config
CONFIG_USE_SEGGER_RTT=y
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251