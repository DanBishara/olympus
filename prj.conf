
CONFIG_SHELL=n
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_BACKEND_RTT=y
# 0 = OFF, 1 = ERROR, 2 = WARNING, 3 = INFO, 4 = DEBUG
CONFIG_LOG_DEFAULT_LEVEL=3 
CONFIG_LOG_MODE_DEFERRED=y

#not sure if this does anything but will set to n just in case
CONFIG_FPROTECT=n

CONFIG_GPIO=y

CONFIG_STATIC_INIT_GNU=y

CONFIG_I2C=y

CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_LED=y

# Stops from printing *** Booting nRF Connect SDK v3.1.1-e2a97fe2578a ***
CONFIG_NCS_BOOT_BANNER=y
CONFIG_BOOT_BANNER=y

# Redirect standard Printk/Printf
CONFIG_PRINTK=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Essential SEGGER RTT Config
CONFIG_USE_SEGGER_RTT=y
CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=3
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=2048

# FPU — Cortex-M33 hardware floating-point unit
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# CMSIS-DSP — arm_rfft_fast_f32, arm_dot_prod_f32, arm_power_f32, arm_max_f32
CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y    # arm_rfft_fast_f32
CONFIG_CMSIS_DSP_STATISTICS=y   # arm_power_f32, arm_max_f32
CONFIG_CMSIS_DSP_BASICMATH=y    # arm_dot_prod_f32